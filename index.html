<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>基金产品库智能分析系统（已去重）</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #0d1117; color: #c9d1d9; line-height: 1.6; }
        
        /* 导航栏 */
        .navbar { background: #161b22; padding: 15px 30px; border-bottom: 1px solid #30363d; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; }
        .navbar h1 { font-size: 18px; color: #58a6ff; display: inline-block; }
        .dedup-badge { background: #238636; color: white; font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-left: 10px; vertical-align: middle; }
        .navbar-left { display: flex; align-items: center; gap: 20px; flex: 1; }
        .navbar-right { display: flex; align-items: center; gap: 15px; }
        
        /* 搜索框 */
        .search-container { position: relative; width: 350px; }
        .search-box { position: relative; width: 100%; }
        .search-box input { width: 100%; padding: 10px 40px 10px 16px; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; color: #c9d1d9; font-size: 14px; transition: all 0.2s; }
        .search-box input:focus { outline: none; border-color: #58a6ff; box-shadow: 0 0 0 3px rgba(88,166,255,0.1); }
        .search-box .search-icon { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #8b949e; font-size: 16px; cursor: pointer; }
        .search-box .clear-icon { position: absolute; right: 36px; top: 50%; transform: translateY(-50%); color: #8b949e; font-size: 14px; cursor: pointer; display: none; padding: 4px; }
        .search-box .clear-icon:hover { color: #f85149; }
        .search-box .clear-icon.visible { display: block; }
        
        /* 搜索下拉列表 */
        .search-dropdown { position: absolute; top: 100%; left: 0; right: 0; margin-top: 8px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; max-height: 400px; overflow-y: auto; z-index: 200; display: none; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
        .search-dropdown.active { display: block; }
        .search-dropdown-header { padding: 10px 16px; border-bottom: 1px solid #30363d; font-size: 12px; color: #8b949e; display: flex; justify-content: space-between; align-items: center; }
        .search-dropdown-header .count { color: #58a6ff; font-weight: 500; }
        .search-dropdown-item { padding: 12px 16px; cursor: pointer; border-bottom: 1px solid #21262d; transition: all 0.15s; display: flex; align-items: center; justify-content: space-between; }
        .search-dropdown-item:last-child { border-bottom: none; }
        .search-dropdown-item:hover, .search-dropdown-item.selected { background: #21262d; }
        .search-dropdown-item.selected { border-left: 3px solid #58a6ff; padding-left: 13px; }
        .search-dropdown-item .fund-info { flex: 1; }
        .search-dropdown-item .fund-name { font-size: 14px; color: #e6edf3; font-weight: 500; margin-bottom: 4px; }
        .search-dropdown-item .fund-name .highlight { color: #58a6ff; background: rgba(88,166,255,0.1); padding: 0 2px; border-radius: 2px; }
        .search-dropdown-item .fund-code { font-size: 12px; color: #8b949e; }
        .search-dropdown-item .fund-code .highlight { color: #58a6ff; background: rgba(88,166,255,0.1); padding: 0 2px; border-radius: 2px; }
        .search-dropdown-item .fund-score { text-align: right; }
        .search-dropdown-item .score-value { font-size: 14px; font-weight: 600; color: #58a6ff; }
        .search-dropdown-item .score-label { font-size: 11px; color: #8b949e; }
        .search-dropdown-empty { padding: 30px 20px; text-align: center; color: #8b949e; font-size: 14px; }
        .search-dropdown-empty .icon { font-size: 32px; margin-bottom: 10px; }
        .search-dropdown-footer { padding: 10px 16px; border-top: 1px solid #30363d; font-size: 12px; color: #8b949e; text-align: center; }
        .search-dropdown-footer kbd { background: #30363d; padding: 2px 6px; border-radius: 4px; font-family: monospace; }
        
        /* 导航链接 */
        .nav-links { display: flex; align-items: center; gap: 20px; }
        .nav-links a { color: #8b949e; text-decoration: none; font-size: 14px; cursor: pointer; padding: 8px 12px; border-radius: 6px; transition: all 0.2s; white-space: nowrap; }
        .nav-links a:hover { color: #58a6ff; background: rgba(88,166,255,0.1); }
        .nav-links a.active { color: #58a6ff; background: rgba(88,166,255,0.15); }
        
        /* 容器 */
        .container { max-width: 1400px; margin: 0 auto; padding: 30px; }
        .section { display: none; }
        .section.active { display: block; overflow-x: hidden; }
        
        /* 指标网格 */
        .metrics-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 15px; margin-bottom: 30px; }
        .metric-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; text-align: center; }
        .metric-card .value { font-size: 28px; font-weight: 600; color: #58a6ff; margin: 10px 0; }
        .metric-card .value.small { font-size: 20px; }
        .metric-card .value.positive { color: #3fb950; }
        .metric-card .value.negative { color: #f85149; }
        .metric-card .label { font-size: 12px; color: #8b949e; }
        
        /* 分类区域 */
        .category-section { margin: 30px 0; }
        .category-section h2 { font-size: 16px; margin-bottom: 20px; color: #e6edf3; }
        .category-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 30px; }
        .category-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; cursor: pointer; transition: all 0.3s; }
        .category-card:hover { border-color: #58a6ff; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(88,166,255,0.15); }
        .category-card h3 { font-size: 14px; color: #e6edf3; margin-bottom: 15px; }
        .category-card .count { font-size: 32px; font-weight: 600; color: #58a6ff; margin-bottom: 10px; }
        .category-card .stats { font-size: 12px; color: #8b949e; }
        .category-card .stats span { display: block; margin: 3px 0; }
        
        /* 表格容器 */
        .table-container { background: #161b22; border: 1px solid #30363d; border-radius: 8px; overflow-x: auto; margin-top: 20px; -webkit-overflow-scrolling: touch; position: relative; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background: #21262d; padding: 12px 15px; text-align: left; font-size: 12px; color: #8b949e; font-weight: 500; position: sticky; top: 0; }
        td { padding: 12px 15px; border-bottom: 1px solid #30363d; font-size: 13px; }
        tr:hover { background: #21262d; }
        tr.clickable { cursor: pointer; }
        
        .fund-name { font-weight: 500; color: #e6edf3; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .fund-code { font-size: 11px; color: #8b949e; }
        .share-badge { background: #30363d; color: #8b949e; font-size: 10px; padding: 1px 6px; border-radius: 4px; }
        .share-badge.merged { background: #238636; color: white; }
        .share-tooltip { position: relative; cursor: help; }
        .share-tooltip:hover::after { content: attr(data-shares); position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #21262d; border: 1px solid #30363d; padding: 8px 12px; border-radius: 6px; font-size: 11px; white-space: nowrap; z-index: 100; color: #e6edf3; }
        .rating { color: #ffd700; letter-spacing: 2px; }
        .score { font-weight: 600; color: #58a6ff; }
        .positive { color: #3fb950; }
        .negative { color: #f85149; }
        
        /* 弹窗 */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: #161b22; border: 1px solid #30363d; border-radius: 12px; width: 100%; max-width: 900px; max-height: 90vh; overflow: hidden; display: flex; flex-direction: column; }
        .modal-header { padding: 20px; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: flex-start; }
        .modal-header h2 { font-size: 18px; color: #e6edf3; margin-bottom: 5px; }
        .modal-header .subtitle { font-size: 12px; color: #8b949e; }
        .modal-close { background: none; border: none; color: #8b949e; font-size: 24px; cursor: pointer; padding: 0; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 6px; }
        .modal-close:hover { background: #30363d; color: #e6edf3; }
        .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
        .modal-section { margin-bottom: 24px; }
        .modal-section h3 { font-size: 14px; color: #58a6ff; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #30363d; }
        .modal-section p { font-size: 13px; line-height: 1.8; color: #c9d1d9; }
        .modal-section ul { list-style: none; padding: 0; }
        .modal-section li { font-size: 13px; padding: 6px 0; padding-left: 16px; position: relative; color: #c9d1d9; }
        .modal-section li::before { content: "•"; color: #58a6ff; position: absolute; left: 0; }
        .merged-info-box { background: rgba(35, 134, 54, 0.1); border: 1px solid #238636; border-radius: 8px; padding: 15px; margin: 15px 0; }
        .merged-info-box h4 { color: #3fb950; font-size: 13px; margin-bottom: 10px; }
        .merged-info-box .share-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .merged-info-box .share-tag { background: #238636; color: white; font-size: 11px; padding: 4px 10px; border-radius: 4px; }
        .back-btn { background: #21262d; border: 1px solid #30363d; color: #8b949e; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-bottom: 20px; font-size: 13px; }
        .back-btn:hover { background: #30363d; color: #e6edf3; }
        
        /* 移动端菜单按钮 */
        .mobile-menu-btn { display: none; background: none; border: none; color: #8b949e; font-size: 20px; cursor: pointer; padding: 8px; }
        
        /* ========== 响应式设计 ========== */
        @media (max-width: 1024px) {
            .container { padding: 20px; }
            .metrics-grid { grid-template-columns: repeat(3, 1fr); }
            .category-grid { grid-template-columns: repeat(2, 1fr); }
            .search-container { width: 280px; }
        }
        
        @media (max-width: 768px) {
            .navbar { padding: 12px 16px; flex-wrap: wrap; gap: 10px; }
            .navbar-left { width: 100%; order: 1; }
            .navbar h1 { font-size: 16px; }
            .navbar-right { width: 100%; order: 2; justify-content: space-between; }
            
            .search-container { width: 100%; }
            .search-dropdown { max-height: 300px; }
            
            .mobile-menu-btn { display: block; }
            
            .nav-links { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; padding: 10px; justify-content: space-around; z-index: 100; }
            .nav-links a { font-size: 12px; padding: 8px 12px; margin: 0; }
            
            .container { padding: 16px; padding-bottom: 80px; }
            .metrics-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .metric-card { padding: 15px; }
            .metric-card .value { font-size: 22px; }
            .category-grid { grid-template-columns: 1fr; }
            
            .modal-content { max-width: 100%; max-height: 95vh; border-radius: 8px; }
            .modal-header { padding: 15px; }
            .modal-header h2 { font-size: 16px; }
            .modal-body { padding: 15px; }
        }
        
        @media (max-width: 480px) {
            .metrics-grid { grid-template-columns: repeat(2, 1fr); }
            .metric-card .value { font-size: 18px; }
            .metric-card .label { font-size: 11px; }
            .category-card { padding: 15px; }
            .category-card .count { font-size: 24px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-left">
            <h1>基金产品库智能分析系统<span class="dedup-badge">已去重</span></h1>
        </div>
        <div class="navbar-right">
            <div class="search-container">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜索基金名称或代码..." autocomplete="off">
                    <span class="clear-icon" id="clearSearch">✕</span>
                    <span class="search-icon">🔍</span>
                </div>
                <div class="search-dropdown" id="searchDropdown">
                    <div class="search-dropdown-header">
                        <span>搜索结果</span>
                        <span class="count" id="searchCount">0</span>
                    </div>
                    <div id="searchResults"></div>
                    <div class="search-dropdown-footer">
                        <kbd>↑</kbd> <kbd>↓</kbd> 选择 <kbd>Enter</kbd> 确认 <kbd>Esc</kbd> 关闭
                    </div>
                </div>
            </div>
            <div class="nav-links">
                <a href="#overview" class="active" onclick="showSection('overview')">概览</a>
                <a href="#top10" onclick="showSection('top10')">TOP10</a>
                <a href="strategy.html">📈 三层级</a>
                <a href="etf_strategy.html">📊 ETF</a>
                <a href="etf_backtest.html">📉 回测</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- 概览页 -->
        <div id="overview" class="section active">
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="label">入库基金总数</div>
                    <div class="value">196</div>
                    <div class="label">已去重 (116组合并)</div>
                </div>
                <div class="metric-card">
                    <div class="label">平均年化收益</div>
                    <div class="value positive">19.75%</div>
                </div>
                <div class="metric-card">
                    <div class="label">平均夏普比率</div>
                    <div class="value">1.03</div>
                </div>
                <div class="metric-card">
                    <div class="label">平均波动率</div>
                    <div class="value">17.39%</div>
                </div>
                <div class="metric-card">
                    <div class="label">平均最大回撤</div>
                    <div class="value negative">13.53%</div>
                </div>
                <div class="metric-card">
                    <div class="label">基金分类</div>
                    <div class="value small">3类</div>
                </div>
            </div>

            <div class="category-section">
                <h2>基金分类</h2>
                <div class="category-grid" id="categoryGrid">
                    <!-- 动态生成分类卡片 -->
                </div>
            </div>
        </div>

        <!-- TOP10页 -->
        <div id="top10" class="section">
            <div class="table-container">
                <table id="top10Table">
                    <thead>
                        <tr>
                            <th>排名</th>
                            <th>基金名称</th>
                            <th>类别</th>
                            <th>星级</th>
                            <th>质量评价</th>
                            <th>综合评分</th>
                        </tr>
                    </thead>
                    <tbody id="top10Body"></tbody>
                </table>
            </div>
        </div>

        <!-- 分类详情页 -->
        <div id="category" class="section">
            <button class="back-btn" onclick="showSection('overview')">← 返回概览</button>
            <h2 id="categoryTitle"></h2>
            <div class="table-container">
                <table id="categoryTable">
                    <thead>
                        <tr>
                            <th>排名</th>
                            <th>基金名称</th>
                            <th>星级</th>
                            <th>质量评价</th>
                            <th>综合分</th>
                        </tr>
                    </thead>
                    <tbody id="categoryBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 详情弹窗 -->
    <div id="fundModal" class="modal-overlay" onclick="closeModalOnBackdrop(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <div>
                    <h2 id="modalFundName"></h2>
                    <div class="subtitle" id="modalFundCode"></div>
                </div>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script src="data.json" type="application/json" id="fundData"></script>
    <script>
        // 基金数据
        let fundReports = {};
        let categories = {};
        let searchSelectedIndex = -1;
        let currentSearchResults = [];

        // 从JSON加载数据
        fetch('data.json')
            .then(r => r.json())
            .then(data => {
                // data.json 直接是基金代码为键的对象
                fundReports = data;
                // 根据 category 字段动态构建分类
                categories = buildCategories(data);
                renderOverview();
                renderTop10();
                setupSearch();
            })
            .catch(err => {
                console.error('加载数据失败:', err);
                fundReports = {};
                categories = {};
                renderOverview();
                renderTop10();
                setupSearch();
            });
        
        // 根据基金数据构建分类
        function buildCategories(fundsData) {
            const cats = {};
            Object.values(fundsData).forEach(fund => {
                const cat = fund.category || '未分类';
                if (!cats[cat]) cats[cat] = [];
                cats[cat].push(fund);
            });
            // 每个分类内按评分排序
            Object.keys(cats).forEach(cat => {
                cats[cat].sort((a, b) => (b.score || 0) - (a.score || 0));
            });
            return cats;
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 数据加载由fetch处理
        });
        
        // 高亮匹配文本
        function highlightText(text, query) {
            if (!query) return text;
            const regex = new RegExp(`(${escapeRegex(query)})`, 'gi');
            return text.replace(regex, '<span class="highlight">$1</span>');
        }
        
        function escapeRegex(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }
        
        // 显示页面
        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
            document.querySelector(`[href="#${sectionId}"]`)?.classList.add('active');
            
            if (sectionId === 'top10') {
                renderTop10();
            }
            window.scrollTo(0, 0);
        }
        
        // 渲染概览
        function renderOverview() {
            const grid = document.getElementById('categoryGrid');
            if (!grid) return;
            grid.innerHTML = '';
            
            Object.entries(categories).forEach(([cat, funds]) => {
                if (!funds || funds.length === 0) return;
                const avgScore = funds.reduce((a, b) => a + (b.score || 0), 0) / funds.length;
                const maxScore = Math.max(...funds.map(f => f.score || 0));
                const card = document.createElement('div');
                card.className = 'category-card';
                card.onclick = () => showCategory(cat);
                card.innerHTML = `
                    <h3>${cat}</h3>
                    <div class="count">${funds.length}</div>
                    <div class="stats">
                        <span>平均评分: ${avgScore.toFixed(1)}</span>
                        <span>最高评分: ${maxScore.toFixed(1)}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }
        
        // 渲染TOP10
        function renderTop10() {
            const sorted = Object.values(fundReports).sort((a, b) => (b.score || 0) - (a.score || 0)).slice(0, 10);
            const tbody = document.getElementById('top10Body');
            if (!tbody) return;
            tbody.innerHTML = '';
            
            sorted.forEach((fund, idx) => {
                const row = document.createElement('tr');
                row.className = 'clickable';
                row.onclick = () => showFundDetail(fund.code);
                
                const rating = fund.rating || '★★★☆☆';
                
                row.innerHTML = `
                    <td><strong>#${idx + 1}</strong></td>
                    <td>
                        <div class="fund-name">${fund.name}</div>
                        <div class="fund-code">${fund.code}</div>
                    </td>
                    <td>${fund.category || '-'}</td>
                    <td><span class="rating">${rating}</span></td>
                    <td>${fund.quality || '-'}</td>
                    <td class="score">${(fund.score || 0).toFixed(1)}</td>
                `;
                tbody.appendChild(row);
            });
        }
        
        // 显示分类详情
        function showCategory(cat) {
            document.getElementById('categoryTitle').textContent = cat + ' - 基金列表';
            const funds = Object.values(fundReports).filter(f => f.category === cat).sort((a, b) => (b.score || 0) - (a.score || 0));
            const tbody = document.getElementById('categoryBody');
            tbody.innerHTML = '';
            
            funds.forEach((fund, idx) => {
                const row = document.createElement('tr');
                row.className = 'clickable';
                row.onclick = () => showFundDetail(fund.code);
                
                const rating = fund.rating || '★★★☆☆';
                
                row.innerHTML = `
                    <td>${idx + 1}</td>
                    <td>
                        <div class="fund-name">${fund.name}</div>
                        <div class="fund-code">${fund.code}</div>
                    </td>
                    <td><span class="rating">${rating}</span></td>
                    <td>${fund.quality || '-'}</td>
                    <td class="score">${(fund.score || 0).toFixed(1)}</td>
                `;
                tbody.appendChild(row);
            });
            
            showSection('category');
        }
        
        // 设置搜索功能
        function setupSearch() {
            const input = document.getElementById('searchInput');
            const dropdown = document.getElementById('searchDropdown');
            const resultsContainer = document.getElementById('searchResults');
            const countEl = document.getElementById('searchCount');
            const clearBtn = document.getElementById('clearSearch');
            
            // 输入事件
            input.addEventListener('input', (e) => {
                const query = e.target.value.trim().toLowerCase();
                searchSelectedIndex = -1;
                
                // 显示/隐藏清除按钮
                clearBtn.classList.toggle('visible', query.length > 0);
                
                if (!query) {
                    dropdown.classList.remove('active');
                    return;
                }
                
                // 搜索匹配
                currentSearchResults = Object.values(fundReports).filter(f => 
                    (f.name && f.name.toLowerCase().includes(query)) || 
                    (f.code && f.code.toLowerCase().includes(query))
                ).slice(0, 10); // 最多显示10个结果
                
                // 更新计数
                const totalMatches = Object.values(fundReports).filter(f => 
                    (f.name && f.name.toLowerCase().includes(query)) || 
                    (f.code && f.code.toLowerCase().includes(query))
                ).length;
                countEl.textContent = `${currentSearchResults.length}/${totalMatches}`;
                
                // 渲染结果
                if (currentSearchResults.length > 0) {
                    resultsContainer.innerHTML = currentSearchResults.map((fund, idx) => `
                        <div class="search-dropdown-item" data-index="${idx}" data-code="${fund.code}">
                            <div class="fund-info">
                                <div class="fund-name">${highlightText(fund.name, query)}</div>
                                <div class="fund-code">${highlightText(fund.code, query)} · ${fund.category || '-'}</div>
                            </div>
                            <div class="fund-score">
                                <div class="score-value">${(fund.score || 0).toFixed(1)}</div>
                                <div class="score-label">综合分</div>
                            </div>
                        </div>
                    `).join('');
                    
                    // 绑定点击事件
                    resultsContainer.querySelectorAll('.search-dropdown-item').forEach(item => {
                        item.addEventListener('click', () => {
                            const code = item.getAttribute('data-code');
                            showFundDetail(code);
                            dropdown.classList.remove('active');
                            input.value = '';
                            clearBtn.classList.remove('visible');
                        });
                    });
                    
                    dropdown.classList.add('active');
                } else {
                    resultsContainer.innerHTML = `
                        <div class="search-dropdown-empty">
                            <div class="icon">🔍</div>
                            <div>未找到匹配的基金</div>
                            <div style="font-size: 12px; margin-top: 8px;">请尝试其他关键词</div>
                        </div>
                    `;
                    dropdown.classList.add('active');
                }
            });
            
            // 清除按钮
            clearBtn.addEventListener('click', () => {
                input.value = '';
                input.focus();
                dropdown.classList.remove('active');
                clearBtn.classList.remove('visible');
                searchSelectedIndex = -1;
            });
            
            // 键盘导航
            input.addEventListener('keydown', (e) => {
                if (!dropdown.classList.contains('active')) return;
                
                const items = resultsContainer.querySelectorAll('.search-dropdown-item');
                
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    searchSelectedIndex = Math.min(searchSelectedIndex + 1, items.length - 1);
                    updateSelection(items);
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    searchSelectedIndex = Math.max(searchSelectedIndex - 1, 0);
                    updateSelection(items);
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    if (searchSelectedIndex >= 0 && items[searchSelectedIndex]) {
                        const code = items[searchSelectedIndex].getAttribute('data-code');
                        showFundDetail(code);
                        dropdown.classList.remove('active');
                        input.value = '';
                        clearBtn.classList.remove('visible');
                    } else if (items.length > 0) {
                        const code = items[0].getAttribute('data-code');
                        showFundDetail(code);
                        dropdown.classList.remove('active');
                        input.value = '';
                        clearBtn.classList.remove('visible');
                    }
                } else if (e.key === 'Escape') {
                    dropdown.classList.remove('active');
                    input.blur();
                }
            });
            
            // 点击外部关闭
            document.addEventListener('click', (e) => {
                if (!input.contains(e.target) && !dropdown.contains(e.target)) {
                    dropdown.classList.remove('active');
                }
            });
            
            // 聚焦时如果有内容则显示下拉
            input.addEventListener('focus', () => {
                if (input.value.trim() && currentSearchResults.length > 0) {
                    dropdown.classList.add('active');
                }
            });
        }
        
        function updateSelection(items) {
            items.forEach((item, idx) => {
                item.classList.toggle('selected', idx === searchSelectedIndex);
            });
            if (items[searchSelectedIndex]) {
                items[searchSelectedIndex].scrollIntoView({ block: 'nearest' });
            }
        }
        
        // 显示基金详情
        function showFundDetail(code) {
            const fund = fundReports[code];
            if (!fund) return;
            
            document.getElementById('modalFundName').textContent = fund.name;
            document.getElementById('modalFundCode').textContent = `${fund.code} · ${fund.category || '-'}`;
            
            let html = '';
            
            // 基本信息
            html += `
                <div class="modal-section">
                    <h3>📊 基本信息</h3>
                    <ul>
                        <li>基金代码: ${fund.code}</li>
                        <li>基金名称: ${fund.name}</li>
                        <li>投资类别: ${fund.category || '-'}</li>
                        <li>综合评分: <span class="score" style="font-size: 18px;">${(fund.score || 0).toFixed(1)}</span></li>
                        <li>星级评价: <span class="rating">${fund.rating || '★★★☆☆'}</span></li>
                        <li>质量评价: ${fund.quality || '-'}</li>
                    </ul>
                </div>
            `;
            
            // 9维度分析
            if (fund['9_dimensions']) {
                const dims = fund['9_dimensions'];
                html += `<div class="modal-section"><h3>🎯 投资框架</h3><p>${dims['1_framework'] || '-'}</p></div>`;
                
                if (dims['2_features'] && dims['2_features'].length > 0) {
                    html += `<div class="modal-section"><h3>⭐ 投资特点</h3><ul>${dims['2_features'].map(f => `<li>${f}</li>`).join('')}</ul></div>`;
                }
                
                if (dims['7_strategy']) {
                    const strat = dims['7_strategy'];
                    html += `<div class="modal-section"><h3>📈 投资策略</h3><ul>`;
                    if (strat['买入']) html += `<li><strong>买入:</strong> ${strat['买入']}</li>`;
                    if (strat['持有']) html += `<li><strong>持有:</strong> ${strat['持有']}</li>`;
                    if (strat['卖出']) html += `<li><strong>卖出:</strong> ${strat['卖出']}</li>`;
                    html += `</ul></div>`;
                }
                
                if (dims['8_capability']) {
                    const cap = dims['8_capability'];
                    html += `<div class="modal-section"><h3>💪 能力圈分析</h3>`;
                    if (cap['强势'] && cap['强势'].length > 0) {
                        html += `<p><strong style="color: #3fb950;">强势领域:</strong></p><ul>${cap['强势'].map(c => `<li>${c}</li>`).join('')}</ul>`;
                    }
                    if (cap['弱势'] && cap['弱势'].length > 0) {
                        html += `<p><strong style="color: #f85149;">弱势领域:</strong></p><ul>${cap['弱势'].map(c => `<li>${c}</li>`).join('')}</ul>`;
                    }
                    html += `</div>`;
                }
            }
            
            document.getElementById('modalBody').innerHTML = html;
            document.getElementById('fundModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        // 关闭弹窗
        function closeModal() {
            document.getElementById('fundModal').classList.remove('active');
            document.body.style.overflow = '';
        }
        
        function closeModalOnBackdrop(e) {
            if (e.target === e.currentTarget) {
                closeModal();
            }
        }
        
        // ESC键关闭弹窗
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
                document.getElementById('searchDropdown').classList.remove('active');
            }
        });
    </script>
</body>
</html>
